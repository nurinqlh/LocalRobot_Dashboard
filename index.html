<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robot Control Center — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0d1117; font-family: 'Exo 2', sans-serif;
    }
    .card {
      background: #161b24; border: 1px solid #21293a; border-radius: 12px;
      padding: 40px 36px; width: 360px;
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: 0.06em; text-transform: uppercase; }
    .logo h1 span { color: #00e5a0; }
    .logo p { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: #4a5568; margin-top: 4px; letter-spacing: 0.1em; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 10px; color: #4a5568; font-family: 'Share Tech Mono', monospace; letter-spacing: 0.1em; margin-bottom: 5px; }
    .field input, .field select {
      width: 100%; background: #0d1117; border: 1px solid #21293a; color: #c8d0db;
      padding: 9px 12px; border-radius: 6px; font-family: 'Share Tech Mono', monospace; font-size: 13px; outline: none;
    }
    .field input:focus, .field select:focus { border-color: #00e5a0; }
    .field select option { background: #161b24; }
    .btn-login {
      width: 100%; padding: 11px; background: rgba(0,229,160,0.12); color: #00e5a0;
      border: 1px solid rgba(0,229,160,0.35); border-radius: 6px; font-size: 13px;
      font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; font-family: 'Exo 2', sans-serif; transition: background 0.2s; margin-top: 6px;
    }
    .btn-login:hover { background: rgba(0,229,160,0.25); }
    .err { color: #ff4d6a; font-size: 11px; font-family: 'Share Tech Mono', monospace; margin-top: 8px; display: none; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>Robot <span>Control</span></h1>
      <p>UNITREE B2 · GLOCOMP</p>
    </div>
    <div class="field">
      <label>USERNAME</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="off">
    </div>
    <div class="field">
      <label>PASSWORD</label>
      <input type="password" id="password" placeholder="Enter password">
    </div>
    <div class="field">
      <label>ROLE</label>
      <select id="role">
        <option value="GlocompAdmin">Admin</option>
        <option value="GlocompEditor">Editor</option>
        <option value="GlocompViewer">Viewer</option>
      </select>
    </div>
    <button class="btn-login" onclick="doLogin()">Login</button>
    <div class="err" id="errMsg">Invalid credentials</div>
  </div>
  <script>
    // Simple credential check — replace with your real auth if needed
    const USERS = {
      GlocompAdmin:  { password: 'Gl0c0mp@Admin!',  role: 'GlocompAdmin'  },
      GlocompEditor: { password: 'Gl0c0mp@Ed1tor!', role: 'GlocompEditor' },
      GlocompViewer: { password: 'Gl0c0mp@V1ew!',   role: 'GlocompViewer' },
    };
    function doLogin() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const role = document.getElementById('role').value;
      const u = USERS[user];
      if (u && u.password === pass && u.role === role) {
        sessionStorage.setItem('robot_auth', '1');
        sessionStorage.setItem('robot_role', role);
        sessionStorage.setItem('robot_user', user);
        window.location.replace('dashboard.html');
      } else {
        document.getElementById('errMsg').style.display = 'block';
      }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
